<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyre-Track Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: { extend: { gridTemplateColumns: { '15': 'repeat(15, minmax(0, 1fr))' } } }
        };
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen text-xs">

<header class="bg-gray-900 border-b border-gray-800 p-3 sticky top-0 z-50 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-circle-nodes text-amber-500 text-lg"></i>
            <div>
                <h1 class="text-sm font-bold tracking-tight">Tyre-Track Pro</h1>
                <p class="text-[10px] text-gray-400">Technical Inventory System</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-black/40 px-3 py-1 rounded border border-gray-800">
            <span class="relative flex h-1.5 w-1.5">
                <span id="ping-indicator" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span id="status-dot" class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span>
            </span>
            <span id="status-text" class="text-[9px] font-mono uppercase tracking-wider text-emerald-400">LIVE DATABASE</span>
        </div>
    </div>
</header>

<main class="container mx-auto px-2 mt-3 grid grid-cols-1 lg:grid-cols-15 gap-4">
    <!-- LEFT SIDEBAR -->
    <div class="lg:col-span-3 space-y-3">
        <nav class="bg-gray-900 border border-gray-800 rounded-lg p-1.5 space-y-0.5">
            <button onclick="switchTab('inventory')" id="tab-btn-inventory" class="w-full text-left px-2.5 py-1.5 rounded text-xs font-medium transition flex items-center space-x-2 bg-amber-600 text-white">
                <i class="fa-solid fa-boxes-stacked w-4"></i><span>Tires Inventory</span>
            </button>
            <button onclick="switchTab('fleet')" id="tab-btn-fleet" class="w-full text-left px-2.5 py-1.5 rounded text-xs font-medium transition flex items-center space-x-2 text-gray-400 hover:text-gray-200 hover:bg-gray-800">
                <i class="fa-solid fa-truck-fleet w-4"></i><span>Active Deployments</span>
            </button>
        </nav>

        <div id="utility-panel" class="bg-gray-900 border border-gray-800 rounded-lg p-3"></div>

        <div id="fleet-side-panel" class="hidden space-y-3">
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-3">
                <div class="flex justify-between items-center mb-3">
                    <div class="text-amber-400 font-bold">Equipment Fleet</div>
                    <button onclick="showAddEquipmentModal()" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1 text-xs rounded flex items-center gap-1">
                        <i class="fa-solid fa-plus"></i> Add
                    </button>
                </div>
                <div id="equipment-list" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="lg:col-span-12 space-y-4">
        <!-- Tires Inventory -->
        <div id="canvas-inventory" class="tab-canvas space-y-4">
            <!-- Paste your full original inventory HTML here if it's not already in the file -->
            <div class="text-center text-gray-400 py-20">Tires Inventory Module (Your Original)</div>
        </div>

        <!-- Fleet / Replacement Module -->
        <div id="canvas-fleet" class="tab-canvas hidden">
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-6">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-tools"></i> TIRE REPLACEMENT MODULE
                </h2>
                <div id="replacement-content">
                    <p class="text-gray-400">Select an equipment from the left panel to start replacement.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Add Equipment Modal -->
<div id="add-equipment-modal" class="fixed inset-0 z-50 hidden bg-black/80 flex items-center justify-center">
    <div class="bg-gray-900 border border-gray-700 rounded-lg w-full max-w-md p-6">
        <h3 class="font-bold mb-4">Add New Equipment</h3>
        <input id="new-equip-num" placeholder="Equipment Number" class="w-full mb-3 bg-gray-800 border border-gray-700 rounded p-3">
        <button onclick="saveNewEquipment()" class="w-full bg-amber-600 py-3 rounded font-bold">Save</button>
        <button onclick="closeAddEquipmentModal()" class="w-full mt-2 text-gray-400">Cancel</button>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://fmkwpgwhkmxcbhiepiui.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZta3dwZ3doa214Y2JoaWVwaXVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMzMxNzgsImV4cCI6MjA5OTgwOTE3OH0.OZ7ZduWZ0GIM-5zD5o-QNNwx0AfKYEeIvdQYMsEq5u4";

    let globalCachedTires = [];
    let equipmentData = [];
    let supabaseClient = null;
    let activeTab = 'inventory';

    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadData() {
        try {
            const { data: tires } = await supabaseClient.from('tires').select('*');
            globalCachedTires = tires || [];
        } catch (e) {
            console.error(e);
        }
    }

    async function renderEquipmentList() {
        const container = document.getElementById('equipment-list');
        const { data } = await supabaseClient.from('equipment').select('*');
        equipmentData = data || [];

        container.innerHTML = '';
        equipmentData.forEach(eq => {
            const div = document.createElement('div');
            div.className = "p-3 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded cursor-pointer transition";
            div.innerHTML = `
                <div class="font-mono font-bold">${eq.equipment_num}</div>
                <div class="text-xs text-gray-400">${eq.equipment_type}</div>
            `;
            div.onclick = () => openReplacementModule(eq);
            container.appendChild(div);
        });
    }

    function openReplacementModule(eq) {
        switchTab('fleet');
        const content = document.getElementById('replacement-content');
        content.innerHTML = `
            <h3 class="font-bold mb-2">Equipment: ${eq.equipment_num} - ${eq.equipment_type}</h3>
            <p class="text-gray-400">Tire Replacement Ledger for this equipment will appear here.</p>
            <p class="text-xs text-amber-400 mt-4">* Full ledger UI coming in next update as per your Excel design.</p>
        `;
    }

    function showAddEquipmentModal() {
        document.getElementById('add-equipment-modal').classList.remove('hidden');
    }

    function closeAddEquipmentModal() {
        document.getElementById('add-equipment-modal').classList.add('hidden');
    }

    async function saveNewEquipment() {
        const num = document.getElementById('new-equip-num').value.trim();
        if (!num) return alert("Enter equipment number");
        await supabaseClient.from('equipment').insert([{ equipment_num: num }]);
        closeAddEquipmentModal();
        renderEquipmentList();
    }

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('canvas-inventory').classList.toggle('hidden', tab !== 'inventory');
        document.getElementById('canvas-fleet').classList.toggle('hidden', tab !== 'fleet');
        if (tab === 'fleet') renderEquipmentList();
    }

    window.onload = async () => {
        await loadData();
        switchTab('inventory');
    };
</script>
</body>
</html>
