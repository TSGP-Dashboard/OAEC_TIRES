<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyre-Track Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { gridTemplateColumns: { '15': 'repeat(15, minmax(0, 1fr))' } } } };
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen selection:bg-amber-500 selection:text-gray-900 text-xs">

<header class="bg-gray-900 border-b border-gray-800 p-3 sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-circle-nodes text-amber-500 text-lg"></i>
            <div>
                <h1 class="text-sm font-bold">Tyre-Track Pro</h1>
                <p class="text-[10px] text-gray-400">Technical Inventory System</p>
            </div>
        </div>
        <div class="flex items-center space-x-2 bg-black/40 px-3 py-1 rounded border border-gray-800">
            <span class="relative flex h-1.5 w-1.5">
                <span id="ping-indicator" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span id="status-dot" class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span>
            </span>
            <span id="status-text" class="text-[9px] font-mono uppercase tracking-wider text-emerald-400">LIVE DATABASE</span>
        </div>
    </div>
</header>

<main class="container mx-auto px-2 mt-3 grid grid-cols-1 lg:grid-cols-15 gap-4">
    <!-- LEFT SIDEBAR -->
    <div class="lg:col-span-3 space-y-3">
        <nav class="bg-gray-900 border border-gray-800 rounded-lg p-1.5 space-y-0.5">
            <button onclick="switchTab('inventory')" id="tab-btn-inventory" class="w-full text-left px-2.5 py-1.5 rounded text-xs font-medium transition flex items-center space-x-2 bg-amber-600 text-white">
                <i class="fa-solid fa-boxes-stacked w-4"></i><span>Tires Inventory</span>
            </button>
            <button onclick="switchTab('fleet')" id="tab-btn-fleet" class="w-full text-left px-2.5 py-1.5 rounded text-xs font-medium transition flex items-center space-x-2 text-gray-400 hover:text-gray-200 hover:bg-gray-800">
                <i class="fa-solid fa-truck-fleet w-4"></i><span>Active Deployments</span>
            </button>
        </nav>

        <div id="utility-panel" class="bg-gray-900 border border-gray-800 rounded-lg p-3"></div>

        <div id="fleet-side-panel" class="hidden space-y-3">
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-3">
                <div class="flex justify-between items-center mb-3">
                    <div class="text-amber-400 font-bold">Equipment Fleet</div>
                    <button onclick="showAddEquipmentModal()" class="bg-emerald-600 hover:bg-emerald-500 text-xs px-3 py-1 rounded">+ Add</button>
                </div>
                <div id="equipment-list" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <!-- MAIN AREA -->
    <div class="lg:col-span-12 space-y-4">
        <div id="canvas-inventory" class="tab-canvas">
            <!-- YOUR ORIGINAL INVENTORY UI GOES HERE -->
            <!-- Paste your full inventory canvas code if needed -->
        </div>

        <div id="canvas-fleet" class="tab-canvas hidden">
            <div id="replacement-ledger-zone" class="bg-gray-900 border border-gray-800 rounded-lg p-4">
                <!-- Tire Replacement Module as per your Excel design -->
                <h2 class="text-lg font-bold mb-4">TIRE REPLACEMENT MODULE</h2>
                <!-- Add your ledger table here -->
            </div>
        </div>
    </div>
</main>

<script>
    const SUPABASE_URL = "https://fmkwpgwhkmxcbhiepiui.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZta3dwZ3doa214Y2JoaWVwaXVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyMzMxNzgsImV4cCI6MjA5OTgwOTE3OH0.OZ7ZduWZ0GIM-5zD5o-QNNwx0AfKYEeIvdQYMsEq5u4";

    let globalCachedTires = [];
    let equipmentData = [];
    let supabaseClient = null;
    let isSupabaseConfigured = false;
    let activeTab = 'inventory';

    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    isSupabaseConfigured = true;

    async function syncEnginePipeline() {
        try {
            const { data } = await supabaseClient.from('tires').select('*');
            globalCachedTires = data || [];
        } catch (e) {
            console.error(e);
        }
        processAndRenderCanvasBoard();
    }

    async function renderEquipmentList() {
        const container = document.getElementById('equipment-list');
        const { data } = await supabaseClient.from('equipment').select('*');
        equipmentData = data || [];

        container.innerHTML = '';
        equipmentData.forEach(eq => {
            const div = document.createElement('div');
            div.className = "p-3 bg-gray-950 hover:bg-gray-800 border border-gray-700 rounded cursor-pointer";
            div.innerHTML = `<div class="font-bold">${eq.equipment_num}</div><div class="text-xs text-gray-400">${eq.equipment_type}</div>`;
            div.onclick = () => openReplacementForEquipment(eq);
            container.appendChild(div);
        });
    }

    function openReplacementForEquipment(eq) {
        // Open the ledger for selected equipment
        switchTab('fleet');
        // Populate ledger with eq.equipment_num etc.
        console.log("Opened replacement for", eq.equipment_num);
    }

    function showAddEquipmentModal() {
        alert("Add Equipment Modal - to be implemented");
    }

    function switchTab(tab) {
        activeTab = tab;
        document.getElementById('canvas-inventory').classList.toggle('hidden', tab !== 'inventory');
        document.getElementById('canvas-fleet').classList.toggle('hidden', tab !== 'fleet');
        if (tab === 'fleet') renderEquipmentList();
    }

    window.onload = () => {
        syncEnginePipeline();
        switchTab('inventory');
    };
</script>
</body>
</html>
